<app-header (openLogin)="openLoginModal()" (openCategories)="openCategoryModal()" (goHome)="onBackToHome()"></app-header>

@if (!showCategoryView) {
  <app-main-website (openLogin)="openLoginModal()"></app-main-website>
} @else {
  <app-category-view 
    [categoryName]="selectedCategoryName"
    [beers]="categoryBeers"
    [initialFilters]="initialFilters"
    (openLogin)="openLoginModal()">
  </app-category-view>
}

<app-footer></app-footer>

@if (showLoginModal) {
  <app-login-modal (close)="closeLoginModal()"></app-login-modal>
}

@if (showCategoryModal) {
  <app-category-modal 
    [availableStyles]="availableStyles"
    (close)="closeCategoryModal()" 
    (selectCategory)="onCategorySelect($event)">
  </app-category-modal>
}
