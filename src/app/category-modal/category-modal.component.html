<div class="modal-overlay" (click)="onClose()">
  <div class="modal-dialog" (click)="$event.stopPropagation()">

    <!-- ── Head ─────────────────────────────────────────────── -->
    <div class="dialog-head">
      <div>
        <h2 class="dialog-title">Browse Categories</h2>
        <p class="dialog-sub">Find exactly what you're looking for</p>
      </div>
      <button class="dialog-close-btn" (click)="onClose()" aria-label="Close">✕</button>
    </div>

    <!-- ── Body ─────────────────────────────────────────────── -->
    <div class="dialog-body">

      <!-- Loading state -->
      <div *ngIf="isLoading" class="dialog-loading">
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
      </div>

      <ng-container *ngIf="!isLoading">

        <!-- Main Categories -->
        <section class="cat-section">
          <h3 class="cat-section-label">Main Categories</h3>
          <div class="cat-grid">
            <button
              *ngFor="let category of mainCategories"
              class="cat-btn"
              (click)="onCategoryClick(category)"
              [attr.aria-label]="category.name">
              <span class="cat-icon">{{ category.icon }}</span>
              <span class="cat-name">{{ category.name }}</span>
              <span class="cat-arrow">→</span>
            </button>
          </div>
        </section>

        <div class="cat-divider"></div>

        <!-- By Style -->
        <section class="cat-section">
          <h3 class="cat-section-label">By Style</h3>
          <div class="cat-grid cat-grid--dense">
            <button
              *ngFor="let category of styleCategories"
              class="cat-btn"
              (click)="onCategoryClick(category)"
              [attr.aria-label]="category.name">
              <span class="cat-icon">{{ getStyleIcon(category.name) }}</span>
              <span class="cat-name">{{ category.name }}</span>
              <span class="cat-arrow">→</span>
            </button>
          </div>
        </section>

      </ng-container>
    </div>

  </div>
</div>
