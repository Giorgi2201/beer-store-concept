<div class="modal-overlay" (click)="onClose()">
    <div class="modal-container" (click)="$event.stopPropagation()">
        <div class="modal-frame">
            <div class="frame-corner top-left"></div>
            <div class="frame-corner top-right"></div>
            <div class="frame-corner bottom-left"></div>
            <div class="frame-corner bottom-right"></div>
            <div class="frame-ornament top-ornament"></div>
            <div class="frame-ornament bottom-ornament"></div>
            <div class="frame-ornament left-ornament"></div>
            <div class="frame-ornament right-ornament"></div>
            
            <button class="close-button" (click)="onClose()" aria-label="Close modal">
                <span class="close-icon">✕</span>
            </button>
            
            <div class="modal-content">
                <h2 class="modal-title">
                    <span class="title-ornament">⚜</span>
                    Browse Categories
                    <span class="title-ornament">⚜</span>
                </h2>
                
                <!-- Main Categories Section -->
                <section class="categories-section">
                    <h3 class="section-title">
                        <span class="section-icon">🏰</span>
                        Main Categories
                    </h3>
                    <div class="categories-grid">
                        <button 
                            *ngFor="let category of mainCategories"
                            class="category-button"
                            [class.disabled]="category.disabled"
                            (click)="!category.disabled && onCategoryClick(category.name)"
                            [attr.aria-label]="category.name"
                        >
                            <span class="category-icon">{{ category.icon }}</span>
                            <span class="category-name">{{ category.name }}</span>
                        </button>
                    </div>
                </section>

                <div class="section-divider">
                    <span class="divider-ornament">❧</span>
                </div>

                <!-- By Style Section -->
                <section class="categories-section">
                    <h3 class="section-title">
                        <span class="section-icon">🍺</span>
                        By Style
                    </h3>
                    <div class="categories-grid">
                        <button 
                            *ngFor="let category of styleCategories"
                            class="category-button"
                            [class.disabled]="category.disabled"
                            (click)="!category.disabled && onCategoryClick(category.name)"
                            [attr.aria-label]="category.name"
                        >
                            <span class="category-icon">{{ category.icon }}</span>
                            <span class="category-name">{{ category.name }}</span>
                        </button>
                    </div>
                </section>
            </div>
        </div>
    </div>
</div>
